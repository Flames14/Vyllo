# Additional metadata
Name: MusicPiped
Summary: "Music streaming app using NewPipe Extractor"
Description: |
  A free and open source music streaming application that uses NewPipe Extractor for retrieving audio streams from YouTube Music.
  
  Features:
  - YouTube Music search and streaming
  - Background playback with notifications
  - Modern Jetpack Compose UI
  - Audio-only stream optimization
  - Download capabilities for offline listening
  - Floating window controls

